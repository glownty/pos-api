<div class="max-w-5xl mx-auto space-y-8 p-4">

    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Dashboard</h1>
            <p class="text-gray-400 text-sm mt-1">Visão geral do sistema</p>
        </div>

        <button onclick="logout()"
            class="bg-gray-800 p-2 rounded-full border border-gray-700 shadow-sm 
                   hover:bg-red-600 hover:border-red-500 transition-all duration-300 group">

            <div class="bg-gray-700 group-hover:bg-red-500 
                        w-10 h-10 rounded-full flex items-center justify-center text-xl 
                        transition-all duration-300">
                🚪
            </div>
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex flex-col">
            <div class="text-gray-400 text-sm uppercase">Receita de Hoje</div>
            <div id="receitaHoje" class="text-4xl font-extrabold mt-2 text-white">R$ 0,00</div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex flex-col">
            <div class="text-gray-400 text-sm uppercase">Ticket Médio</div>
            <div id="ticketMedio" class="text-4xl font-extrabold mt-2 text-white">R$ 0,00</div>
        </div>

    </div>

    <div>
        <button onclick="goToPDV()"
            class="bg-gradient-to-r from-blue-600 to-blue-500 p-4 rounded-2xl font-bold text-lg text-white w-full">
            🛒 Abrir PDV
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <button onclick="navigate('products')" class="bg-gray-800 p-5 rounded-2xl">📦 Produtos</button>
        <button onclick="navigate('sales')" class="bg-gray-800 p-5 rounded-2xl">💰 Vendas</button>
        <button onclick="navigate('clients')" class="bg-gray-800 p-5 rounded-2xl">👤 Clientes</button>
        <button onclick="navigate('cashregister')" class="bg-gray-800 p-5 rounded-2xl">🧾 Caixa</button>
        <button onclick="navigate('statistics')" class="bg-gray-800 p-5 rounded-2xl">📊 Estatísticas</button>
        <button onclick="openSettings()" class="bg-gray-800 p-5 rounded-2xl">⚙️ Configurações</button>

    </div>

    <div class="flex justify-end pt-4 border-t border-gray-800">
        <button onclick="logout()"
            class="text-red-400 hover:text-white hover:bg-red-600 px-6 py-2 rounded-xl border border-red-900">
            Sair
        </button>
    </div>

</div>
