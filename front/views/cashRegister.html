<div class="max-w-5xl mx-auto space-y-6 p-4">

    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white">Caixa</h1>
        <button onclick="navigate('home')" class="p-2 bg-gray-800 rounded-lg">🏠</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 text-center">
            <div class="text-gray-400 text-sm">Hoje</div>
            <div class="text-white font-bold text-xl">R$ --</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 text-center">
            <div class="text-gray-400 text-sm">Entradas</div>
            <div class="text-green-400 font-bold text-xl">R$ --</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 text-center">
            <div class="text-gray-400 text-sm">Saídas</div>
            <div class="text-red-400 font-bold text-xl">R$ --</div>
        </div>
    </div>

    <div id="cashregister-action-card" class="bg-gray-800 p-6 rounded-2xl border border-gray-700"></div>

    <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
        <h2 class="text-lg font-semibold text-white mb-4">🔍 Filtros</h2>
        <div class="flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full">
                <label class="text-gray-400 text-xs mb-1 block">Período</label>
                <select id="filter-type" onchange="handleFilterChange()" class="bg-gray-900 text-white p-3 w-full rounded border border-gray-700 outline-none">
                    <option value="today">Hoje</option>
                    <option value="this_week">Esta semana</option>
                    <option value="this_month">Este mês</option>
                    <option value="custom">Período Personalizado</option>
                </select>
            </div>

            <div id="custom-date-container" class="hidden flex gap-4 w-full">
                <div class="w-full">
                    <label class="text-gray-400 text-xs mb-1 block">Início</label>
                    <input type="date" id="filter-start" class="bg-gray-900 text-white p-3 w-full rounded border border-gray-700">
                </div>
                <div class="w-full">
                    <label class="text-gray-400 text-xs mb-1 block">Fim</label>
                    <input type="date" id="filter-end" class="bg-gray-900 text-white p-3 w-full rounded border border-gray-700">
                </div>
            </div>

            <button onclick="applyFilter()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded font-bold transition-colors px-8">
                Filtrar
            </button>
        </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
        <h2 class="mb-4 text-lg font-semibold text-white">🧾 Histórico</h2>

        <div id="cashregister-history-list"></div>

        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-700">
            <button id="btn-prev" onclick="prevPage()" class="bg-gray-700 text-white px-4 py-2 rounded disabled:opacity-30">Anterior</button>
            <span id="page-info" class="text-gray-400 text-sm">Página 1 de 1</span>
            <button id="btn-next" onclick="nextPage()" class="bg-gray-700 text-white px-4 py-2 rounded disabled:opacity-30">Próxima</button>
        </div>
    </div>

</div>

<div id="adjustment-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 p-6 rounded-2xl border border-gray-700 w-[90%] max-w-md">
        <h2 class="text-white text-lg font-bold mb-2">Ajustar Caixa</h2>
        <p class="text-gray-400 text-sm mb-4" id="adjustment-old-value"></p>

        <input id="adjustment-input" type="number" class="bg-gray-800 text-white p-3 w-full mb-3 rounded border border-gray-700" placeholder="Novo valor final">
        <input id="adjustment-desc" type="text" class="bg-gray-800 text-white p-3 w-full mb-4 rounded border border-gray-700" placeholder="Motivo do ajuste">

        <div class="flex gap-2">
            <button onclick="confirmAdjustment()" class="bg-blue-600 p-2 w-full rounded text-white font-bold">Confirmar</button>
            <button onclick="closeAdjustmentModal()" class="bg-red-600 p-2 w-full rounded text-white font-bold">Cancelar</button>
        </div>
    </div>
</div>
