<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/login.css">
</head>
<body>
<h1>Login</h1>
<form id="loginForm">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<button id="registerRedirect">Go to Register</button>
<div id="message"></div>

<script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = form.username.value;
        const password = form.password.value;

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if(res.ok){
                // salva token no localStorage
                localStorage.setItem('jwtToken', data);
                message.textContent = 'Login successful! Redirecting to tasks...';

                // redireciona para tasks
                window.location.href = '/tasks.html';
            } else {
                message.textContent = data.message || data.msg || 'Login failed';
            }

        } catch(err){
            message.textContent = 'Network error';
        }
    });

    // Redireciona para register
    document.getElementById('registerRedirect').addEventListener('click', () => {
        window.location.href = '/register.html';
    });
</script>
</body>
</html>
