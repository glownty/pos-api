<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <title>PDV System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        .hidden {
            display: none !important;
        }

    </style>

</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden">

<!-- LOGIN -->
<div
    id="authView"
    class="h-screen flex items-center justify-center"
>

    <div class="bg-gray-800 p-6 rounded w-96">

        <h2
            id="authTitle"
            class="text-xl font-bold mb-4"
        >
            Login
        </h2>

        <form
            id="authForm"
            class="space-y-2"
        >

            <input
                id="username"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="usuário"
            >

            <input
                id="password"
                type="password"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="senha"
            >

            <button class="bg-blue-600 hover:bg-blue-500 transition-all w-full p-2 rounded">
                Entrar
            </button>

        </form>

        <p
            id="toggleAuth"
            class="text-center mt-3 cursor-pointer text-gray-300 hover:text-white transition-all"
        >
            Registrar
        </p>

    </div>

</div>

<!-- APP -->
<div
    id="appView"
    class="hidden flex h-screen relative overflow-hidden"
>

    <!-- SIDEBAR -->
    <aside
        id="sidebar"
        class="
            w-64
            bg-gray-800
            border-r
            border-gray-700
            flex
            flex-col
            transition-all
            duration-300
            overflow-hidden
        "
    >

        <!-- HEADER -->
        <div class="p-5 border-b border-gray-700 flex items-center justify-between">

            <div>

                <h1 class="text-2xl font-extrabold tracking-tight">
                    PDV System
                </h1>

                <p class="text-gray-400 text-sm mt-1">
                    Painel administrativo
                </p>

            </div>

            <button
                onclick="toggleSidebar()"
                class="
                    text-gray-400
                    hover:text-white
                    text-xl
                    transition-all
                "
            >
                ☰
            </button>

        </div>

        <!-- NAV -->
        <nav class="flex-1 p-4 space-y-2 overflow-auto">

            <button
                onclick="navigate('home')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                🏠 Home
            </button>

            <button
                onclick="navigate('products')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                📦 Produtos
            </button>

            <button
                onclick="navigate('pdv')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                🛒 PDV
            </button>

            <button
                onclick="navigate('sales')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                💰 Vendas
            </button>

            <button
                onclick="navigate('cashRegister')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                🏦 Caixa
            </button>

            <button
                onclick="navigate('clients')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                👥 Clientes
            </button>

            <button
                onclick="navigate('statistics')"
                class="
                    w-full
                    text-left
                    px-4
                    py-3
                    rounded-xl
                    bg-gray-700
                    hover:bg-gray-600
                    transition-all
                "
            >
                📊 Estatísticas
            </button>

        </nav>

        <!-- FOOTER -->
        <div class="p-4 border-t border-gray-700">

            <button
                onclick="logout()"
                class="
                    w-full
                    bg-red-600
                    hover:bg-red-500
                    transition-all
                    px-4
                    py-3
                    rounded-xl
                    font-semibold
                "
            >
                Sair
            </button>

        </div>

    </aside>

    <!-- CONTENT -->
    <main class="flex-1 overflow-auto">

        <!-- TOPBAR -->
        <div class="h-16 border-b border-gray-700 bg-gray-800 flex items-center px-5">

            <button
                onclick="toggleSidebar()"
                class="
                    text-2xl
                    text-gray-300
                    hover:text-white
                    transition-all
                "
            >
                ☰
            </button>

        </div>

        <!-- VIEW -->
        <div class="p-4">

            <div id="viewContainer">
                <!-- app.js -->
            </div>

        </div>

    </main>

</div>

<!-- TOGGLE SIDEBAR -->
<script>

    let sidebarOpen = true;

    function toggleSidebar() {

        const sidebar = document.getElementById('sidebar');

        sidebarOpen = !sidebarOpen;

        if (sidebarOpen) {

            sidebar.classList.remove(
                '-ml-64'
            );

        } else {

            sidebar.classList.add(
                '-ml-64'
            );
        }
    }

    window.toggleSidebar = toggleSidebar;

</script>

<!-- SCRIPTS -->
<script type="module" src="/app.js"></script>

<script src="/auth.js"></script>

<!-- LEGACY PDV -->
<script src="/services/pdvService.js"></script>

<script src="/scripts/pdv.js"></script>

<!-- MODAL CRIAR PRODUTO -->
<div
    id="createProductModal"
    class="
        hidden
        fixed
        inset-0
        bg-black/60
        flex
        items-center
        justify-center
        z-50
    "
>

    <div class="bg-gray-800 w-[420px] p-6 rounded-lg shadow-lg">

        <h2 class="text-xl font-bold mb-4">
            Novo Produto
        </h2>

        <div class="space-y-3">

            <input
                id="cp_name"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Nome do produto"
            >

            <input
                id="cp_barcode"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Código de barras"
            >

            <input
                id="cp_price"
                type="number"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Preço"
            >

            <input
                id="cp_cost"
                type="number"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Custo"
            >

            <input
                id="cp_stock"
                type="number"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Estoque"
            >

            <input
                id="cp_category"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Categoria"
            >

            <select
                id="cp_active"
                class="w-full p-2 bg-gray-700 rounded"
            >
                <option value="1">Ativo</option>
                <option value="0">Inativo</option>
            </select>

        </div>

        <div class="flex justify-between mt-5">

            <button
                onclick="closeCreateProductModal()"
                class="
                    px-4
                    py-2
                    bg-gray-600
                    rounded
                    hover:bg-gray-500
                    transition-all
                "
            >
                Cancelar
            </button>

            <button
                onclick="submitCreateProduct()"
                class="
                    px-4
                    py-2
                    bg-blue-600
                    rounded
                    hover:bg-blue-500
                    transition-all
                "
            >
                Salvar
            </button>

        </div>

    </div>

</div>

<!-- MODAL EDITAR PRODUTO -->
<div
    id="editProductModal"
    class="
        hidden
        fixed
        inset-0
        bg-black/60
        flex
        items-center
        justify-center
        z-50
    "
>

    <div class="bg-gray-800 w-[420px] p-6 rounded-lg shadow-lg">

        <h2 class="text-xl font-bold mb-4">
            Editar Produto
        </h2>

        <input
            id="ep_id"
            type="hidden"
        >

        <div class="space-y-3">

            <input
                id="ep_name"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Nome"
            >

            <input
                id="ep_barcode"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Código"
            >

            <input
                id="ep_price"
                type="number"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Preço"
            >

            <input
                id="ep_cost"
                type="number"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Custo"
            >

            <input
                id="ep_stock"
                type="number"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Estoque"
            >

            <input
                id="ep_category"
                class="w-full p-2 bg-gray-700 rounded"
                placeholder="Categoria"
            >

            <select
                id="ep_active"
                class="w-full p-2 bg-gray-700 rounded"
            >
                <option value="1">Ativo</option>
                <option value="0">Inativo</option>
            </select>

        </div>

        <div class="flex justify-between mt-5">

            <button
                onclick="closeEditProductModal()"
                class="
                    px-4
                    py-2
                    bg-gray-600
                    rounded
                    hover:bg-gray-500
                    transition-all
                "
            >
                Cancelar
            </button>

            <button
                onclick="submitEditProduct()"
                class="
                    px-4
                    py-2
                    bg-green-600
                    rounded
                    hover:bg-green-500
                    transition-all
                "
            >
                Atualizar
            </button>

        </div>

    </div>

</div>

</body>
</html>
