<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PDV System</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .hidden { display: none !important; }
    </style>
</head>

<body class="bg-gray-900 text-white h-screen overflow-hidden">

<!-- LOGIN -->
<div id="authView" class="h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded w-96">

        <h2 class="text-xl font-bold mb-4" id="authTitle">Login</h2>

        <form id="authForm" class="space-y-2">
            <input id="username" class="w-full p-2 bg-gray-700" placeholder="usuário">
            <input id="password" type="password" class="w-full p-2 bg-gray-700" placeholder="senha">

            <button class="bg-blue-600 w-full p-2">Entrar</button>
        </form>

        <p id="toggleAuth" class="text-center mt-3 cursor-pointer text-gray-300">
            Registrar
        </p>

    </div>
</div>

<!-- APP -->
<div id="appView" class="hidden flex h-screen">

    <!-- CONTENT -->
    <div class="flex-1 p-4 overflow-auto">
        <div id="viewContainer">
            <!-- app.js vai carregar HTML aqui -->
        </div>
    </div>

</div>

<!-- SCRIPTS -->
<script type="module" src="app.js"></script>
<script src="auth.js"></script>
<script src="products.js"></script>
<script src="/services/pdvService.js"></script>
<script src="/scripts/pdv.js"></script>
<script src="sales.js"></script>

<!-- MODAL CRIAR PRODUTO -->
<div id="createProductModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

    <div class="bg-gray-800 w-[420px] p-6 rounded-lg shadow-lg">

        <h2 class="text-xl font-bold mb-4">Novo Produto</h2>

        <div class="space-y-3">

            <input id="cp_name" class="w-full p-2 bg-gray-700 rounded" placeholder="Nome do produto">
            <input id="cp_barcode" class="w-full p-2 bg-gray-700 rounded" placeholder="Código de barras">
            <input id="cp_price" type="number" class="w-full p-2 bg-gray-700 rounded" placeholder="Preço">
            <input id="cp_cost" type="number" class="w-full p-2 bg-gray-700 rounded" placeholder="Custo">
            <input id="cp_stock" type="number" class="w-full p-2 bg-gray-700 rounded" placeholder="Estoque">
            <input id="cp_category" class="w-full p-2 bg-gray-700 rounded" placeholder="Categoria">

            <select id="cp_active" class="w-full p-2 bg-gray-700 rounded">
                <option value="1">Ativo</option>
                <option value="0">Inativo</option>
            </select>

        </div>

        <div class="flex justify-between mt-5">
            <button onclick="closeCreateProductModal()" class="px-4 py-2 bg-gray-600 rounded">
                Cancelar
            </button>

            <button onclick="submitCreateProduct()" class="px-4 py-2 bg-blue-600 rounded">
                Salvar
            </button>
        </div>

    </div>
</div>

<!-- MODAL EDITAR PRODUTO -->
<div id="editProductModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

    <div class="bg-gray-800 w-[420px] p-6 rounded-lg shadow-lg">

        <h2 class="text-xl font-bold mb-4">Editar Produto</h2>

        <input id="ep_id" type="hidden">

        <div class="space-y-3">

            <input id="ep_name" class="w-full p-2 bg-gray-700 rounded" placeholder="Nome">
            <input id="ep_barcode" class="w-full p-2 bg-gray-700 rounded" placeholder="Código">
            <input id="ep_price" type="number" class="w-full p-2 bg-gray-700 rounded" placeholder="Preço">
            <input id="ep_cost" type="number" class="w-full p-2 bg-gray-700 rounded" placeholder="Custo">
            <input id="ep_stock" type="number" class="w-full p-2 bg-gray-700 rounded" placeholder="Estoque">
            <input id="ep_category" class="w-full p-2 bg-gray-700 rounded" placeholder="Categoria">

            <select id="ep_active" class="w-full p-2 bg-gray-700 rounded">
                <option value="1">Ativo</option>
                <option value="0">Inativo</option>
            </select>

        </div>

        <div class="flex justify-between mt-5">
            <button onclick="closeEditProductModal()" class="px-4 py-2 bg-gray-600 rounded">
                Cancelar
            </button>

            <button onclick="submitEditProduct()" class="px-4 py-2 bg-green-600 rounded">
                Atualizar
            </button>
        </div>

    </div>
</div>

</body>
</html>
